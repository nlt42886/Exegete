<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patristic Reading Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap');

  :root {
    --parchment: #F5F0E8;
    --parchment-dark: #EDE6D8;
    --ink: #2C1810;
    --ink-light: #5C4033;
    --accent: #8B1A1A;
    --accent-light: #B34747;
    --gold: #C19A3E;
    --gold-light: #E8D5A3;
    --teal: #2E6B62;
    --teal-light: #E0F0ED;
    --section-apostolic: #8B1A1A;
    --section-ante: #2E6B62;
    --section-nicene: #4A3080;
    --shadow: rgba(44, 24, 16, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #2C1810 0%, #4A2C20 50%, #2C1810 100%);
    color: var(--parchment);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    position: relative;
  }

  header p {
    font-size: 0.95rem;
    opacity: 0.7;
    margin-top: 0.5rem;
    position: relative;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 1.5rem;
    background: var(--parchment-dark);
    border-bottom: 1px solid rgba(44,24,16,0.1);
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .controls button {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border: 1.5px solid var(--ink-light);
    border-radius: 4px;
    background: transparent;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .controls button:hover {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .controls button.active {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  .progress-bar {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .progress-bar .bar {
    width: 100px;
    height: 6px;
    background: rgba(44,24,16,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar .bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 3px;
    transition: width 0.3s;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .section-header {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 700;
    padding: 1rem 0 0.5rem;
    margin-top: 1.5rem;
    border-bottom: 2px solid;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }

  .section-header .count {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    opacity: 0.5;
  }

  .section-header.apostolic { color: var(--section-apostolic); border-color: var(--section-apostolic); }
  .section-header.ante-nicene { color: var(--section-ante); border-color: var(--section-ante); }
  .section-header.nicene { color: var(--section-nicene); border-color: var(--section-nicene); }

  .reading-list {
    list-style: none;
    counter-reset: reading;
  }

  .reading-item {
    counter-increment: reading;
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid rgba(44,24,16,0.07);
    transition: background 0.15s;
    position: relative;
  }

  .reading-item:hover {
    background: rgba(44,24,16,0.025);
  }

  .reading-item .num {
    width: 48px;
    min-width: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--ink-light);
    opacity: 0.4;
  }

  .reading-item .checkbox {
    width: 36px;
    min-width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .reading-item .checkbox input {
    display: none;
  }

  .reading-item .checkbox .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid rgba(44,24,16,0.25);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .reading-item .checkbox input:checked + .check-box {
    background: var(--gold);
    border-color: var(--gold);
  }

  .reading-item .checkbox input:checked + .check-box::after {
    content: '✓';
    color: white;
    font-size: 12px;
    font-weight: bold;
  }

  .reading-item.completed .title-text {
    text-decoration: line-through;
    opacity: 0.45;
  }

  .reading-item .content {
    flex: 1;
    padding: 0.6rem 0.75rem 0.6rem 0;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .title-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-light);
    transition: opacity 0.2s;
  }

  .author-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .arrow-connector {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0 0 48px;
    height: 0;
    overflow: visible;
    position: relative;
  }

  .arrow-connector svg {
    opacity: 0.15;
  }

  /* View modes */
  .view-table .reading-list { display: table; width: 100%; }
  .view-table .reading-item { display: table-row; }
  .view-table .reading-item > * { display: table-cell; vertical-align: middle; }

  .view-compact .reading-item .content { padding: 0.35rem 0.5rem 0.35rem 0; }
  .view-compact .title-text { font-size: 0.95rem; }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 1.5rem;
    padding: 1rem 0;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat .val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
  }

  .stat .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    opacity: 0.6;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>Patristic Reading Plan</h1>
  <p>A sequential journey through the Church Fathers</p>
</header>

<div class="controls">
  <button class="active" onclick="setView('default')">List</button>
  <button onclick="setView('compact')">Compact</button>
  <button onclick="toggleCompleted()">Hide Completed</button>
  <div class="progress-bar">
    <span id="progressText">0 / 0</span>
    <div class="bar"><div class="bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<main id="main"></main>

    ]
  }

let completedSet = new Set(JSON.parse(localStorage.getItem('patristic_completed') || '[]'));
let hideCompleted = false;
let currentView = 'default';

function save() {
  localStorage.setItem('patristic_completed', JSON.stringify([...completedSet]));
}

function getGlobalIndex(sectionIdx, workIdx) {
  let n = 0;
  for (let s = 0; s < sectionIdx; s++) n += DATA[s].works.length;
  return n + workIdx;
}

function totalWorks() {
  return DATA.reduce((a, s) => a + s.works.length, 0);
}

function updateProgress() {
  const total = totalWorks();
  const done = completedSet.size;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

function toggleCheck(globalIdx) {
  if (completedSet.has(globalIdx)) completedSet.delete(globalIdx);
  else completedSet.add(globalIdx);
  save();
  render();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.controls button').forEach((b,i) => {
    b.classList.toggle('active', i === (v === 'default' ? 0 : v === 'compact' ? 1 : -1));
  });
  render();
}

function toggleCompleted() {
  hideCompleted = !hideCompleted;
  const btn = document.querySelectorAll('.controls button')[2];
  btn.classList.toggle('active', hideCompleted);
  btn.textContent = hideCompleted ? 'Show All' : 'Hide Completed';
  render();
}

function render() {
  const main = document.getElementById('main');
  let html = '';

  // Stats
  const total = totalWorks();
  const authorMap = {};
  DATA.forEach(s => s.works.forEach(([t, a]) => {
    const key = a || 'Anonymous/Various';
    authorMap[key] = (authorMap[key] || 0) + 1;
  }));

  html += `<div class="stats-row">
    <div class="stat"><div class="val">${total}</div><div class="label">Total Works</div></div>
    <div class="stat"><div class="val">${Object.keys(authorMap).length}</div><div class="label">Authors</div></div>
    <div class="stat"><div class="val">${DATA.length}</div><div class="label">Periods</div></div>
    <div class="stat"><div class="val">${completedSet.size}</div><div class="label">Completed</div></div>
  </div>`;

  DATA.forEach((section, si) => {
    const sectionCompleted = section.works.filter((_, wi) => completedSet.has(getGlobalIndex(si, wi))).length;
    html += `<div class="section-header ${section.cls}">${section.section} <span class="count">${sectionCompleted}/${section.works.length}</span></div>`;
    html += `<ol class="reading-list">`;

    section.works.forEach(([title, author], wi) => {
      const gi = getGlobalIndex(si, wi);
      const done = completedSet.has(gi);
      const hiddenCls = (hideCompleted && done) ? ' hidden' : '';
      const completedCls = done ? ' completed' : '';

      html += `<li class="reading-item${completedCls}${hiddenCls}">
        <div class="num">${gi + 1}</div>
        <label class="checkbox">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleCheck(${gi})">
          <div class="check-box"></div>
        </label>
        <div class="content">
          ${author ? `<span class="author-text">${author} —</span>` : ''}
          <span class="title-text">${title}</span>
        </div>
      </li>`;
    });

    html += `</ol>`;
  });

  main.innerHTML = html;
  if (currentView === 'compact') main.classList.add('view-compact');
  else main.classList.remove('view-compact');
  updateProgress();
}

render();
</script>
</body>
</html>
